<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>环保主题页面</title>
    <style>
        /* 背景与文字颜色 */
        body {
            background-color: #e8f5e9; /* 浅绿色背景 */
            color: #2e7d32; /* 深绿色文字 */
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            padding: 0;
        }
        h1 {
            color: #1b5e20; /* 深绿色标题 */
            text-align: center;
            margin-top: 30px;
        }
        .highlight {
            color: #00695c; /* 鲜绿色高亮 */
        }
        .container {
            width: 80%;
            margin: auto;
            padding: 20px;
        }
        .search-box {
            display: flex;
            margin: 20px 0;
        }
        .search-box input {
            flex: 1;
            padding: 10px;
            border: 2px solid #2e7d32;
            border-right: none;
            border-radius: 5px 0 0 5px;
        }
        .search-box button {
            padding: 10px 20px;
            background-color: #2e7d32;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 0 5px 5px 0;
        }
        .content-section {
            background-color: #f1f8e9;
            border: 1px solid #c8e6c9;
            border-radius: 8px;
            margin-bottom: 20px;
            padding: 20px;
        }
        .content-section h2 {
            color: #2e7d32;
        }
        footer {
            text-align: center;
            padding: 10px;
            background-color: #c8e6c9;
            color: #2e7d32;
        }
    </style>
</head>
<body>
    <h1>欢迎来到<span class="highlight">绿色地球</span>！</h1>
    <div class="container">
        <!-- 搜索框 -->
        <div class="search-box">
            <input type="text" placeholder="请输入您需要的环保类别">
            <button>搜索</button>
        </div>

        <!-- 内容展示区 -->
        <section class="content-section">
            <h2>关于我们</h2>
            <p>我们致力于推广绿色生活方式，分享最新的环保资讯和可持续发展理念。</p>
        </section>

        <section class="content-section">
            <h2>环保小贴士</h2>
            <ul>
                <li>减少一次性塑料使用</li>
                <li>节约用水用电</li>
                <li>绿色出行，少开车</li>
            </ul>
        </section>
    </div>
    <footer>
        &copy; 2026 绿色地球. 版权所有.
    </footer>
</body>
</html>
